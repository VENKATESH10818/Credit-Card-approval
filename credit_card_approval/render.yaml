# Render.com deployment config
# Deploy both the Streamlit app and the FastAPI service

services:
  # ── Streamlit UI ────────────────────────────────────────────────────────────
  - type: web
    name: creditai-streamlit
    env: python
    buildCommand: "pip install -r requirements.txt && python train.py"
    startCommand: "streamlit run app.py --server.port=$PORT --server.address=0.0.0.0"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  - type: web
    name: creditai-api
    env: python
    buildCommand: "pip install -r requirements.txt && python train.py"
    startCommand: "uvicorn api:app --host 0.0.0.0 --port $PORT"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
